<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The National Press — Wire (prototype)</title>
<style>
  :root{
    --bg:#F2F0E9; --panel:#FBFAF6; --panel-2:#F6F4EC; --card:#FFFFFF;
    --ink:#1A1A17; --sub:#6B6862; --faint:#9A968C; --line:#E1DDD2; --line-2:#D3CEC1;
    --rust:#C4472A; --rust-soft:#F6E7E0; --rust-ink:#9E3620;
    --green:#4E8C5A; --green-soft:#E8F0E7;
    --amber:#B07D12; --amber-soft:#FBF2D6;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --serif:Georgia,"Times New Roman",Times,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  a{color:var(--rust-ink)}

  /* Masthead */
  .mast{background:var(--bg);border-bottom:1px solid var(--line-2)}
  .mast-in{max-width:1080px;margin:0 auto;padding:18px 22px;display:flex;align-items:center;gap:20px}
  .logo{border:2px solid var(--ink);padding:6px 12px;font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:.01em;line-height:1;display:flex;align-items:center;gap:7px}
  .logo .star{color:var(--ink)}
  .mast-nav{display:flex;align-items:center;gap:16px;margin-left:6px}
  .mast-nav .eyebrow{cursor:default}
  .mast-nav .patterns{color:var(--rust);background:var(--rust-soft);padding:3px 8px;border-radius:3px}
  .mast-sp{flex:1}
  .btn-ghost{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);border:1px solid var(--line-2);background:transparent;border-radius:4px;padding:6px 10px;cursor:pointer}
  .btn-ghost:hover{background:var(--panel-2)}

  .statusbar{max-width:1080px;margin:0 auto;padding:10px 22px 18px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--sub)}
  .statusbar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
  .statusbar .sp{flex:1}

  .shell{max-width:1080px;margin:0 auto;padding:0 22px 60px}

  .prebeta{background:var(--rust-soft);border:1px solid #EBD3C8;border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--sub);margin-bottom:20px}
  .prebeta b{color:var(--rust-ink)}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line-2);border-radius:6px;padding:9px 13px}
  .search input{border:0;outline:0;background:transparent;flex:1;font-size:14px;color:var(--ink);font-family:var(--sans)}
  .thresh{display:flex;border:1px solid var(--line-2);border-radius:6px;overflow:hidden;background:var(--card)}
  .thresh button{border:0;border-right:1px solid var(--line);background:transparent;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;padding:8px 11px;color:var(--sub);cursor:pointer}
  .thresh button:last-child{border-right:0}
  .thresh button.active{background:var(--rust);color:#fff}
  .thresh button:hover:not(.active){background:var(--panel-2);color:var(--ink)}

  /* Saved / folders bar (ITEM 3) */
  .folders{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .folders .eyebrow{margin-right:2px}
  .chip{font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;border:1px solid var(--line-2);background:var(--card);color:var(--sub);border-radius:20px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--line-2);background:var(--panel-2)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .n{font-weight:700}
  .chip.star.active{background:var(--rust);border-color:var(--rust)}
  .chip-new{color:var(--rust-ink);border-style:dashed}
  .newfolder-in{font-family:var(--mono);font-size:12px;border:1px solid var(--line-2);border-radius:20px;padding:5px 12px;outline:none;width:150px}

  /* Editorial wire */
  .wire-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .wire-head h2{font-family:var(--serif);font-size:15px;letter-spacing:.02em;text-transform:uppercase;margin:0;color:var(--ink);font-weight:700}
  .wire-sub{color:var(--sub);font-size:13px;margin:0 0 16px}

  .row{position:relative;display:grid;grid-template-columns:74px 1fr 32px;gap:16px;padding:18px 0;border-top:1px solid var(--line);cursor:pointer}
  .row:first-of-type{border-top:2px solid var(--ink)}
  .row:hover{background:linear-gradient(90deg,rgba(196,71,42,.03),transparent 40%)}
  .rank{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:4px}
  .score{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--rust);line-height:1}
  .split{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--amber);background:var(--amber-soft);border:1px solid #ECD9A0;border-radius:3px;padding:2px 5px;text-align:center;line-height:1.3}
  .split b{display:block;color:var(--ink)}
  .headline{font-family:var(--serif);font-size:19px;font-weight:700;line-height:1.28;margin:0 0 5px;letter-spacing:-.005em}
  .dek{color:var(--sub);font-size:14px;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.02em}
  .showtag{color:var(--rust-ink);letter-spacing:.05em}
  .showtag b{color:var(--ink)}
  .metasep{color:var(--line-2)}
  .views{background:var(--panel-2);border:1px solid var(--line);border-radius:4px;padding:2px 7px}
  .hot{color:var(--rust)}
  .folder-marks{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .fmark{font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--sub);background:var(--panel-2);border:1px solid var(--line);border-radius:4px;padding:2px 7px;display:inline-flex;align-items:center;gap:5px}
  .fmark .x{color:var(--faint);cursor:pointer;font-weight:700}
  .fmark .x:hover{color:var(--rust)}

  .add{align-self:start;justify-self:end;width:30px;height:30px;border-radius:6px;border:1px solid var(--line-2);background:var(--card);color:var(--sub);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .add:hover{border-color:var(--rust);color:var(--rust)}
  .add.saved{background:var(--rust);border-color:var(--rust);color:#fff}

  /* Save popover (ITEM 3) */
  .pop{position:absolute;right:0;top:44px;z-index:30;width:240px;background:var(--card);border:1px solid var(--line-2);border-radius:8px;box-shadow:0 8px 30px rgba(26,26,23,.14);padding:8px}
  .pop-head{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:6px 8px 8px}
  .pop-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:5px;cursor:pointer;font-size:13.5px}
  .pop-item:hover{background:var(--panel-2)}
  .pop-check{width:15px;height:15px;border:1.5px solid var(--line-2);border-radius:3px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
  .pop-check.on{background:var(--rust);border-color:var(--rust)}
  .pop-div{height:1px;background:var(--line);margin:6px 4px}
  .pop-new{display:flex;gap:6px;padding:4px}
  .pop-new input{flex:1;font-size:13px;border:1px solid var(--line-2);border-radius:5px;padding:6px 8px;outline:none;font-family:var(--sans)}
  .pop-new button{border:0;background:var(--ink);color:#fff;border-radius:5px;padding:0 11px;cursor:pointer;font-size:13px}

  .empty{text-align:center;color:var(--faint);padding:48px 20px;font-size:14px}
  .empty b{color:var(--sub)}

  /* Detail overlay */
  .overlay{position:fixed;inset:0;background:rgba(26,26,23,.32);z-index:60;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
  .overlay.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:760px;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
  .sheet-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg)}
  .sheet-body{padding:22px 26px 8px}
  .d-score{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--rust);line-height:1}
  .d-scorelbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint)}
  .d-headline{font-family:var(--serif);font-size:25px;font-weight:700;line-height:1.2;margin:6px 0 10px}
  .d-source{font-family:var(--mono);font-size:12px;color:var(--sub);margin-bottom:2px}
  .d-station{font-family:var(--mono);font-size:12px;color:var(--faint);margin-bottom:18px}
  .d-lede{font-size:15.5px;line-height:1.6;margin:0 0 20px}
  .d-sec{margin:0 0 18px}
  .d-sec .eyebrow{display:block;margin-bottom:6px}
  .d-sec p{margin:0;color:var(--sub);font-size:14px;line-height:1.55}
  .greenlight{background:var(--card);border:1px solid var(--line-2);border-radius:8px;padding:14px 16px;font-size:14.5px;line-height:1.55;color:var(--ink)}
  .risks .eyebrow{color:var(--amber)}
  .showfit{display:grid;gap:10px}
  .sf{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:13px 15px}
  .sf-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px}
  .sf-name{font-family:var(--serif);font-weight:700;font-size:15px}
  .sf-name span{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:400;margin-left:8px}
  .sf-score{font-family:var(--mono);font-weight:700;color:var(--rust)}
  .sf-q{font-size:14px;margin:0}
  .sheet-foot{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);padding:12px 20px;display:flex;gap:10px;align-items:center}
  .foot-btn{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line-2);background:var(--card);color:var(--ink);border-radius:6px;padding:9px 14px;cursor:pointer}
  .foot-btn:hover{background:var(--panel-2)}
  .foot-btn.primary{background:var(--rust);border-color:var(--rust);color:#fff}
  .foot-sp{flex:1}
  .close-x{border:0;background:transparent;font-size:22px;color:var(--sub);cursor:pointer;line-height:1}

  @media(max-width:720px){
    .row{grid-template-columns:60px 1fr 30px;gap:11px}
    .score{font-size:24px}
    .mast-nav{display:none}
  }
</style>
</head>
<body>
  <header class="mast">
    <div class="mast-in">
      <div class="logo">THE NATIONAL PRESS <span class="star">★</span></div>
      <div class="mast-nav">
        <span class="eyebrow">Wire v0.2</span>
        <span class="eyebrow patterns">Emerging Patterns</span>
      </div>
      <div class="mast-sp"></div>
      <button class="btn-ghost">Feedback</button>
      <button class="btn-ghost">Map</button>
    </div>
    <div class="statusbar">
      <span id="storyCount">0</span>&nbsp;stories <span class="metasep">·</span> updated 1h ago
      <span class="sp"></span>
      <span><span class="dot"></span>Pipeline active</span>
    </div>
  </header>

  <div class="shell">
    <div class="prebeta"><b>PRE-BETA</b> &nbsp;The National Press Wire prototype — bookmarks &amp; folders demo (item 3). Mock data, in-memory only.</div>

    <div class="controls">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9A968C" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search all stories, any date…" autocomplete="off">
      </div>
      <div class="thresh" id="thresh">
        <button data-min="0" class="active">ALL</button>
        <button data-min="5">5+</button>
        <button data-min="7">7+</button>
        <button data-min="8">8+</button>
      </div>
    </div>

    <!-- ITEM 3: saved / folders bar -->
    <div class="folders" id="folderBar"></div>

    <div class="wire-head">
      <h2>Editorial Wire</h2>
      <span class="eyebrow" id="wireCount">—</span>
    </div>
    <p class="wire-sub" id="wireSub">Stories ranked by national breakout potential</p>

    <div id="wire"></div>
  </div>

  <!-- Detail overlay -->
  <div class="overlay" id="overlay">
    <div class="sheet" id="sheet"></div>
  </div>

<script>
/* ------------------------------------------------------------------
   The National Press — Wire prototype
   Structure mirrors the live TNP Wire (breakout score, ranked rows,
   show-fit, editorial fields). Story COPY is original mock data —
   not the live product's reporting.
   ITEM 3 (Jana): bookmark stories + file into custom folders.
   // TODO: persist bookmarks + folders to backend when wired into the
   //       real Next.js TNP Wire app. All state below is in-memory.
------------------------------------------------------------------- */

const STORIES = [
  { id:"s1", score:8.4, split:1.1, hot:true, views:112,
    headline:"Rural county becomes first in region to cap large data-center tax breaks",
    original:"County commission votes to limit data-center abatements after farmer pushback",
    station:"WXMT", market:"Cedar Falls-Waterloo, IA", network:"NBC",
    dek:"Commissioners approved a ceiling on property-tax abatements after months of testimony from displaced growers, a move other counties are already citing.",
    why:"One of the first local governments to translate data-center backlash into a concrete policy limit — a template other rural counties facing the same buildout can copy.",
    angle:"Follow one grower through the commission fight; then map which other counties have similar abatement deals pending.",
    greenlight:"A named policy change, a datable vote, and an on-the-record human at the center — the most concrete entry point yet into a national story that's still mostly abstract.",
    risks:"The cap could be challenged or repealed; confirm it survives before framing it as settled.",
    fit:{deep:5,morning:4,debate:4} },
  { id:"s2", score:8.1, split:0.7, hot:false, views:64,
    headline:"Nurses at three regional hospitals pilot a shared-staffing model to cut burnout",
    original:"Hospitals try floating nurse pool to ease shortages",
    station:"KVLR", market:"Spokane, WA", network:"ABC",
    dek:"A cross-hospital staffing pool is showing early drops in overtime and turnover, and administrators in two other states have asked for the playbook.",
    why:"A solutions story with measurable early results, in a sector every market covers — high transferability if the numbers hold.",
    angle:"Shadow one floating nurse across two hospitals in a single week; anchor on the turnover data.",
    greenlight:"Concrete, replicable, and non-partisan — a clean solutions segment with real metrics and a human throughline.",
    risks:"Early data only; a single quarter isn't a trend. Flag sample size on screen.",
    fit:{deep:4,morning:5,debate:2} },
  { id:"s3", score:7.9, split:0.4, hot:true, views:98,
    headline:"Small-town pharmacies close as a wave of chain buyouts reshapes access",
    original:"Independent pharmacy closures leave county with one provider",
    station:"WBTC", market:"Beckley, WV", network:"CBS",
    dek:"A county down to a single pharmacy is an early marker of a consolidation pattern showing up across at least six states.",
    why:"An early-warning story: what's happening here is a leading indicator of an access problem spreading nationally.",
    angle:"Drive the 40-minute round trip a resident now makes for a prescription; widen to the six-state closure map.",
    greenlight:"Pattern-across-markets plus a vivid local stakes — travels well and isn't being told nationally yet.",
    risks:"Consolidation causes are contested; represent the business context fairly.",
    fit:{deep:5,morning:3,debate:3} },
  { id:"s4", score:7.6, split:0.9, hot:false, views:41,
    headline:"City's camera-enforcement pilot cuts crashes but reopens a privacy fight",
    original:"Traffic camera trial reduces collisions at downtown intersections",
    station:"KANV", market:"Wichita, KS", network:"FOX",
    dek:"A pilot corridor logged fewer collisions; supporters want it expanded while residents question the vendor contract and data retention.",
    why:"A clean public-safety-vs-civil-liberties tension with data on one side and real community concern on the other.",
    angle:"Put the crash-reduction numbers next to vox pop from the affected blocks; press the city on retention.",
    greenlight:"A genuine two-sided question with advocates available on both sides — built for the debate format.",
    risks:"Vendor data may be incomplete; get independent figures before leading with the reduction stat.",
    fit:{deep:3,morning:3,debate:5} },
  { id:"s5", score:7.3, split:0.5, hot:false, views:33,
    headline:"A county food bank's zip-code map exposes a widening rural hunger gap",
    original:"Food bank data shows demand shifting to outlying areas",
    station:"WDGA", market:"Albany, GA", network:"NBC",
    dek:"Distribution data mapped by zip code shows demand climbing fastest in the areas furthest from services — a shift mirrored in other regions.",
    why:"A data-driven look at a change communities can see but rarely quantify; the map is the story.",
    angle:"Animate the zip-code shift over three years; ride along on a rural delivery route.",
    greenlight:"Strong visual, transferable method, and an underreported angle on a familiar subject.",
    risks:"Correlation isn't cause; be careful attributing the shift to any single policy.",
    fit:{deep:4,morning:4,debate:2} },
  { id:"s6", score:7.0, split:0.6, hot:false, views:27,
    headline:"Community college retools a semester program to fill a local factory's openings",
    original:"College partners with manufacturer on fast-track training",
    station:"WKHL", market:"Huntsville, AL", network:"ABC",
    dek:"A compressed training track placed its first cohort into plant jobs within months, and two nearby employers want in.",
    why:"A workforce-solutions story with a measurable placement rate and an obvious replication path.",
    angle:"Track one graduate from enrollment to the plant floor; get the placement numbers on screen.",
    greenlight:"Positive, concrete, and easily localized to any market with a training-employer gap.",
    risks:"Small first cohort; don't overstate durability from one class.",
    fit:{deep:3,morning:5,debate:2} },
  { id:"s7", score:6.7, split:0.3, hot:false, views:19,
    headline:"A school board's phone policy splits parents from administrators",
    original:"District weighs full cellphone ban amid parent objections",
    station:"KTVE", market:"Boise, ID", network:"CBS",
    dek:"Administrators cite focus and behavior gains; some parents want reachability during emergencies. The fight is playing out in districts nationwide.",
    why:"A parents-vs-institutions tension replicating across the country this year.",
    angle:"Sit in on one board meeting; then survey how neighboring districts landed on the same question.",
    greenlight:"Relatable, two-sided, and everywhere at once — good local hook into a national debate.",
    risks:"Avoid caricaturing either side; both have reasonable stakes.",
    fit:{deep:3,morning:4,debate:4} },
  { id:"s8", score:6.3, split:0.8, hot:false, views:14,
    headline:"Volunteer-run broadband co-op wires a valley the big carriers skipped",
    original:"Residents build their own fiber network after carriers decline",
    station:"WVMT", market:"Burlington, VT", network:"NBC",
    dek:"A resident cooperative strung its own fiber after carriers passed on the area; nearby towns are asking how it was financed.",
    why:"A grassroots solution to a gap thousands of communities share — strong how-they-did-it value.",
    angle:"Walk the line with the volunteers; break down the financing model other towns keep asking about.",
    greenlight:"Uplifting, replicable, and visually rich — a solutions piece with a clear method.",
    risks:"Financing specifics matter; verify the co-op's numbers before presenting as a model.",
    fit:{deep:4,morning:4,debate:1} },
];

// ---- ITEM 3 state (in-memory) ----
let folders = [];            // [{id,name}]
let bookmarks = new Set();   // story ids
let storyFolders = {};       // storyId -> Set(folderId)
let folderSeq = 1;

// ---- view state ----
let activeView = "all";      // "all" | "bookmarks" | folderId
let minScore = 0;
let searchTerm = "";
let openPop = null;          // storyId whose popover is open

const $ = s => document.querySelector(s);
const foldersOf = id => storyFolders[id] || (storyFolders[id] = new Set());

function folderCount(fid){ return Object.keys(storyFolders).filter(sid=>storyFolders[sid].has(fid)).length; }
function findFolderByName(name){
  const norm = name.trim().toLowerCase();
  return folders.find(f=>f.name.trim().toLowerCase()===norm);
}
// Creates a folder only if no existing folder matches (case-insensitive); otherwise
// reuses the existing one. Returns the resulting folder id, or null for a blank name.
function getOrCreateFolder(name){
  const v = name.trim();
  if(!v) return null;
  const existing = findFolderByName(v);
  if(existing) return existing.id;
  const f = {id:"f"+(folderSeq++), name:v};
  folders.push(f);
  return f.id;
}

function visibleStories(){
  const q = searchTerm.trim().toLowerCase();
  return STORIES.filter(s=>{
    if(s.score < minScore) return false;
    if(activeView==="bookmarks" && !bookmarks.has(s.id)) return false;
    if(activeView!=="all" && activeView!=="bookmarks" && !foldersOf(s.id).has(activeView)) return false;
    if(q && !(s.headline+" "+s.dek+" "+s.station+" "+s.market).toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderFolders(){
  const bar = $("#folderBar");
  const chips = [];
  chips.push(`<span class="eyebrow">Saved</span>`);
  chips.push(`<button class="chip ${activeView==="all"?"active":""}" data-view="all">All stories</button>`);
  chips.push(`<button class="chip star ${activeView==="bookmarks"?"active":""}" data-view="bookmarks">★ Bookmarks <span class="n">${bookmarks.size}</span></button>`);
  folders.forEach(f=>{
    chips.push(`<button class="chip ${activeView===f.id?"active":""}" data-view="${f.id}">${escapeHtml(f.name)} <span class="n">${folderCount(f.id)}</span></button>`);
  });
  chips.push(`<button class="chip chip-new" id="newFolderBtn">+ New folder</button>`);
  bar.innerHTML = chips.join("");

  bar.querySelectorAll(".chip[data-view]").forEach(el=>el.addEventListener("click",()=>{
    activeView = el.dataset.view; openPop=null; render();
  }));
  const nf = $("#newFolderBtn");
  if(nf) nf.addEventListener("click", promptNewFolderInline);
}

function promptNewFolderInline(){
  const bar=$("#folderBar");
  const btn=$("#newFolderBtn");
  const wrap=document.createElement("span");
  wrap.innerHTML=`<input class="newfolder-in" placeholder="Folder name…" />`;
  btn.replaceWith(wrap);
  const inp=wrap.querySelector("input"); inp.focus();
  let settled=false;
  const onBlur=()=>finish(true);
  const finish=(shouldCommit)=>{
    if(settled) return; settled=true;
    inp.removeEventListener("blur",onBlur);
    if(shouldCommit){
      const fid=getOrCreateFolder(inp.value);
      if(fid) activeView=fid;
    }
    render();
  };
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter") finish(true);
    else if(e.key==="Escape") finish(false);
  });
  inp.addEventListener("blur",onBlur);
}

function render(){
  $("#storyCount").textContent = STORIES.length;
  renderFolders();

  const list = visibleStories();
  const label = activeView==="all" ? "" :
                activeView==="bookmarks" ? " · Bookmarks" :
                " · " + (folders.find(f=>f.id===activeView)?.name || "");
  $("#wireCount").textContent = `${list.length} of ${STORIES.length}`;
  $("#wireSub").textContent = "Stories ranked by national breakout potential" + label;

  const wire=$("#wire");
  if(!list.length){
    wire.innerHTML = activeView==="all"
      ? `<div class="empty">No stories match this filter. Clear the search or lower the score threshold.</div>`
      : activeView==="bookmarks"
        ? `<div class="empty"><b>No bookmarks yet.</b><br>Hit the ＋ on any story to save it for later.</div>`
        : `<div class="empty"><b>This folder is empty.</b><br>Open a story and add it here, or use the ＋ on a row.</div>`;
    return;
  }
  wire.innerHTML = list.map((s,i)=>rowHTML(s,i)).join("");
  bindRows();
}

function rowHTML(s, i){
  const saved = bookmarks.has(s.id) || foldersOf(s.id).size>0;
  const fmarks = [...foldersOf(s.id)].map(fid=>{
    const f=folders.find(x=>x.id===fid); if(!f) return "";
    return `<span class="fmark">${escapeHtml(f.name)} <span class="x" data-rm="${s.id}|${fid}">×</span></span>`;
  }).join("");
  return `
  <div class="row" data-id="${s.id}">
    <div>
      <div class="rank">#${i+1}</div>
      <div class="score">${s.score.toFixed(1)}</div>
      <div class="split">SPLIT<b>Δ${s.split.toFixed(1)}</b></div>
    </div>
    <div>
      <h3 class="headline">${escapeHtml(s.headline)}</h3>
      <p class="dek">${escapeHtml(s.dek)}</p>
      <div class="meta">
        <span class="showtag"><b>DEEP DIVE</b> ${s.fit.deep}</span>
        <span class="showtag"><b>MORNING</b> ${s.fit.morning}</span>
        <span class="showtag"><b>DEBATE</b> ${s.fit.debate}</span>
        <span class="metasep">·</span>
        <span>${s.station} / ${s.network} · ${s.market}</span>
        <span class="views">📈 ${s.views} views (5d)</span>
        ${s.hot?`<span class="hot">🔥</span>`:""}
      </div>
      ${fmarks?`<div class="folder-marks">${fmarks}</div>`:""}
    </div>
    <button class="add ${saved?"saved":""}" data-add="${s.id}" aria-label="Save story">${saved?"★":"+"}</button>
    ${openPop===s.id?popHTML(s):""}
  </div>`;
}

function popHTML(s){
  const bm = bookmarks.has(s.id);
  const items = folders.map(f=>{
    const on = foldersOf(s.id).has(f.id);
    return `<div class="pop-item" data-tf="${s.id}|${f.id}"><span class="pop-check ${on?"on":""}">${on?"✓":""}</span>${escapeHtml(f.name)}</div>`;
  }).join("");
  return `
  <div class="pop" data-pop="1" onclick="event.stopPropagation()">
    <div class="pop-head">Save story</div>
    <div class="pop-item" data-bm="${s.id}"><span class="pop-check ${bm?"on":""}">${bm?"✓":""}</span>★ Bookmark for later</div>
    ${folders.length?`<div class="pop-div"></div><div class="pop-head">Folders</div>${items}`:""}
    <div class="pop-div"></div>
    <div class="pop-new">
      <input placeholder="New folder…" data-newfolder="${s.id}" />
      <button data-newfolderbtn="${s.id}">Add</button>
    </div>
  </div>`;
}

function bindRows(){
  document.querySelectorAll(".row").forEach(row=>{
    row.addEventListener("click",e=>{
      if(e.target.closest("[data-add]")||e.target.closest("[data-pop]")||e.target.closest("[data-rm]")) return;
      openDetail(row.dataset.id);
    });
  });
  document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const id=b.dataset.add; openPop = openPop===id?null:id; render();
  }));
  document.querySelectorAll("[data-rm]").forEach(x=>x.addEventListener("click",e=>{
    e.stopPropagation();
    const [sid,fid]=x.dataset.rm.split("|"); foldersOf(sid).delete(fid); render();
  }));
  bindPop();
}

function bindPop(){
  document.querySelectorAll("[data-bm]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation(); const id=el.dataset.bm;
    bookmarks.has(id)?bookmarks.delete(id):bookmarks.add(id); render();
  }));
  document.querySelectorAll("[data-tf]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation(); const [sid,fid]=el.dataset.tf.split("|");
    foldersOf(sid).has(fid)?foldersOf(sid).delete(fid):foldersOf(sid).add(fid); render();
  }));
  document.querySelectorAll("[data-newfolderbtn]").forEach(btn=>btn.addEventListener("click",e=>{
    e.stopPropagation(); const sid=btn.dataset.newfolderbtn;
    const inp=document.querySelector(`[data-newfolder="${sid}"]`);
    const fid=getOrCreateFolder(inp.value);
    if(fid) foldersOf(sid).add(fid);
    render();
  }));
  document.querySelectorAll("[data-newfolder]").forEach(inp=>inp.addEventListener("keydown",e=>{
    e.stopPropagation();
    if(e.key==="Enter"){ const sid=inp.dataset.newfolder;
      const fid=getOrCreateFolder(inp.value);
      if(fid) foldersOf(sid).add(fid);
      render(); }
  }));
}

// close popover on outside click
document.addEventListener("click",e=>{
  if(openPop!==null && !e.target.closest(".pop") && !e.target.closest("[data-add]")){ openPop=null; render(); }
});

function openDetail(id){
  const s=STORIES.find(x=>x.id===id); if(!s) return;
  const bm=bookmarks.has(s.id);
  $("#sheet").innerHTML=`
    <div class="sheet-top">
      <span class="eyebrow">← Back to wire</span>
      <button class="close-x" id="closeSheet">×</button>
    </div>
    <div class="sheet-body">
      <div style="display:flex;gap:16px;align-items:flex-start">
        <div><div class="d-score">${s.score.toFixed(1)}</div><div class="d-scorelbl">Breakout</div></div>
        <div style="flex:1">
          <h1 class="d-headline">${escapeHtml(s.headline)}</h1>
          <div class="d-source">Source: ${escapeHtml(s.original)}</div>
          <div class="d-station">${s.station} · ${s.market} · ${s.network} &nbsp; <a href="#" onclick="return false">Original →</a></div>
        </div>
      </div>
      <p class="d-lede">${escapeHtml(s.dek)}</p>
      <div class="d-sec"><span class="eyebrow">Why it matters</span><p>${escapeHtml(s.why)}</p></div>
      <div class="d-sec"><span class="eyebrow">Editorial angle</span><p>${escapeHtml(s.angle)}</p></div>
      <div class="d-sec"><span class="eyebrow">Greenlight reason</span><div class="greenlight">${escapeHtml(s.greenlight)}</div></div>
      <div class="d-sec risks"><span class="eyebrow">Risks / unknowns</span><p>${escapeHtml(s.risks)}</p></div>
      <div class="d-sec"><span class="eyebrow">Show fit</span>
        <div class="showfit">
          ${sfCard("The Deep Dive","what question does this open?",s.fit.deep)}
          ${sfCard("The Morning Show","bookable as a segment tomorrow?",s.fit.morning)}
          ${sfCard("The Debate","a genuine two-sided question?",s.fit.debate)}
        </div>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="foot-btn">Export</button>
      <button class="foot-btn">Copy link</button>
      <button class="foot-btn primary">Original</button>
      <div class="foot-sp"></div>
      <button class="foot-btn" id="detailBm">${bm?"★ Bookmarked":"☆ Bookmark"}</button>
      <button class="foot-btn" id="detailFolder">Add to folder</button>
    </div>`;
  $("#overlay").classList.add("open");
  $("#closeSheet").addEventListener("click",closeDetail);
  $("#detailBm").addEventListener("click",()=>{ bm?bookmarks.delete(s.id):bookmarks.add(s.id); openDetail(s.id); render(); });
  $("#detailFolder").addEventListener("click",()=>{ closeDetail(); openPop=s.id; render();
    setTimeout(()=>{ const el=document.querySelector(`[data-add="${s.id}"]`); if(el) el.scrollIntoView({block:"center"}); },30); });
}
function sfCard(name,q,score){
  return `<div class="sf"><div class="sf-top"><div class="sf-name">${name}<span>${q}</span></div><div class="sf-score">${score}/5</div></div></div>`;
}
function closeDetail(){ $("#overlay").classList.remove("open"); }
$("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeDetail(); });

// controls
$("#searchInput").addEventListener("input",e=>{ searchTerm=e.target.value; render(); });
document.querySelectorAll("#thresh button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#thresh button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); minScore=+b.dataset.min; render();
}));

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

render();
</script>
</body>
</html>
